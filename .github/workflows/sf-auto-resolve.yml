name: Auto-resolve SF metadata conflicts

on:
  push:
    branches: [main]
    paths:
      - 'force-app/**'
      - 'package.xml'
      - 'destructiveChanges*.xml'

  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to resolve (leave empty to scan all open PRs)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  resolve-conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI and merge driver plugin
        run: |
          npm install -g @salesforce/cli
          echo "y" | sf plugins install sf-git-merge-driver
          sf git merge driver install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find and resolve conflicting PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.pr_number || '' }}" ]; then
            PR_NUMBERS="${{ inputs.pr_number }}"
          else
            PR_NUMBERS=$(gh pr list --state open --json number --jq '.[].number')
          fi

          if [ -z "$PR_NUMBERS" ]; then
            echo "No open PRs found."
            exit 0
          fi

          # Build list of supported file patterns from .gitattributes
          SUPPORTED_PATTERNS=()
          while IFS= read -r line; do
            # Extract the glob pattern (first field) from lines with merge=salesforce-source
            pattern=$(echo "$line" | grep 'merge=salesforce-source' | awk '{print $1}')
            [ -n "$pattern" ] && SUPPORTED_PATTERNS+=("$pattern")
          done < .gitattributes
          echo "Supported merge driver patterns (${#SUPPORTED_PATTERNS[@]}):"
          printf '  %s\n' "${SUPPORTED_PATTERNS[@]}"

          # Function: check if a file matches any supported pattern
          is_supported_type() {
            local file="$1"
            local basename
            basename=$(basename "$file")
            for pattern in "${SUPPORTED_PATTERNS[@]}"; do
              # Use bash pattern matching (fnmatch-style)
              # shellcheck disable=SC2254
              case "$basename" in
                $pattern) return 0 ;;
              esac
            done
            return 1
          }

          RESOLVED=0
          FORCE_RESOLVED=0
          FAILED=0
          SKIPPED=0

          for PR in $PR_NUMBERS; do
            echo "========================================="
            echo "Processing PR #$PR"
            echo "========================================="

            PR_DATA=$(gh pr view "$PR" --json headRefName,mergeable,mergeStateStatus)
            BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')
            MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable')

            echo "Branch: $BRANCH"
            echo "Mergeable: $MERGEABLE"

            # If UNKNOWN, wait for GitHub to compute
            if [ "$MERGEABLE" = "UNKNOWN" ]; then
              echo "Waiting for GitHub to compute mergeability..."
              for i in 1 2 3 4 5 6; do
                sleep 5
                PR_DATA=$(gh pr view "$PR" --json headRefName,mergeable)
                MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable')
                echo "  Attempt $i: $MERGEABLE"
                if [ "$MERGEABLE" != "UNKNOWN" ]; then break; fi
              done
            fi

            if [ "$MERGEABLE" = "MERGEABLE" ]; then
              echo "PR #$PR is already mergeable, skipping."
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "PR #$PR has conflicts. Attempting auto-resolve with sf-git-merge-driver..."

            git fetch origin "$BRANCH" 2>/dev/null || {
              echo "Failed to fetch branch $BRANCH, skipping."
              FAILED=$((FAILED + 1))
              continue
            }

            git checkout "origin/$BRANCH" 2>/dev/null

            if git merge origin/main --no-edit; then
              echo "Merge succeeded cleanly (driver resolved all conflicts)."
              git push origin HEAD:"$BRANCH" && {
                echo "PR #$PR resolved and pushed."
                RESOLVED=$((RESOLVED + 1))
              } || {
                echo "Failed to push resolved branch for PR #$PR."
                FAILED=$((FAILED + 1))
              }
            else
              # Driver resolved what it could, but true conflicts remain.
              # Force-accept bundle version ONLY for supported metadata types
              # (those registered in .gitattributes with merge=salesforce-source).
              # Unsupported types require manual resolution.
              echo "True conflicts remain. Checking file types..."

              FORCE_RESOLVED_FILES=""
              UNSUPPORTED_CONFLICTS=""
              while IFS= read -r CONFLICTED_FILE; do
                [ -z "$CONFLICTED_FILE" ] && continue
                if is_supported_type "$CONFLICTED_FILE"; then
                  echo "  Force-resolving (supported): $CONFLICTED_FILE"
                  git checkout --ours -- "$CONFLICTED_FILE"
                  git add -- "$CONFLICTED_FILE"
                  FORCE_RESOLVED_FILES="$FORCE_RESOLVED_FILES\n  - $CONFLICTED_FILE"
                else
                  echo "  Unsupported type (manual): $CONFLICTED_FILE"
                  UNSUPPORTED_CONFLICTS="$UNSUPPORTED_CONFLICTS\n  - $CONFLICTED_FILE"
                fi
              done < <(git diff --name-only --diff-filter=U)

              if [ -n "$UNSUPPORTED_CONFLICTS" ]; then
                echo "PR #$PR has unsupported type conflicts that need manual resolution:"
                echo -e "$UNSUPPORTED_CONFLICTS"
                git merge --abort 2>/dev/null || true
                FAILED=$((FAILED + 1))
              else
                COMMIT_MSG="Auto-resolve: merge main into $BRANCH"
                COMMIT_MSG="$COMMIT_MSG\n\nsf-git-merge-driver resolved false conflicts automatically."
                COMMIT_MSG="$COMMIT_MSG\nRemaining supported-type conflicts force-resolved with promotion branch version (ours):"
                COMMIT_MSG="$COMMIT_MSG$FORCE_RESOLVED_FILES"
                git commit -m "$(echo -e "$COMMIT_MSG")"

                git push origin HEAD:"$BRANCH" && {
                  echo "PR #$PR resolved (with force-overwrite) and pushed."
                  FORCE_RESOLVED=$((FORCE_RESOLVED + 1))
                } || {
                  echo "Failed to push resolved branch for PR #$PR."
                  git merge --abort 2>/dev/null || true
                  FAILED=$((FAILED + 1))
                }
              fi
            fi

            git checkout main 2>/dev/null
          done

          echo ""
          echo "========================================="
          echo "Summary:"
          echo "  $RESOLVED cleanly resolved (driver only)"
          echo "  $FORCE_RESOLVED force-resolved (bundle version wins)"
          echo "  $SKIPPED already clean"
          echo "  $FAILED failed"
          echo "========================================="
