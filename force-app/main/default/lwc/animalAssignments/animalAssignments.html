<template>
    <lightning-card title="Care Assignments" icon-name="custom:custom26">
        <div slot="actions">
            <lightning-button label="New Assignment" icon-name="utility:add" onclick={handleNewAssignment}></lightning-button>
        </div>
        
        <div class="slds-p-horizontal_small">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </template>
            
            <template if:true={error}>
                <div class="slds-text-color_error">
                    Error loading assignments: {error.body.message}
                </div>
            </template>
            
            <template if:false={hasAssignments}>
                <div class="slds-text-align_center slds-p-around_medium">
                    <div class="slds-text-heading_small slds-text-color_weak">No assignments found</div>
                    <p class="slds-m-top_small">Click "New Assignment" to assign this animal to a caregiver and enclosure.</p>
                </div>
            </template>
            
            <template if:true={hasAssignments}>
                <div class="slds-text-heading_small slds-m-bottom_small">Active Assignments</div>
                
                <template if:false={hasActiveAssignments}>
                    <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                        No active assignments found
                    </div>
                </template>
                
                <template if:true={hasActiveAssignments}>
                    <div class="slds-box slds-theme_shade slds-m-bottom_medium">
                        <ul class="slds-has-dividers_bottom-space">
                            <template for:each={activeAssignments} for:item="assignment">
                                <li key={assignment.id} class="slds-item">
                                    <div class="slds-grid slds-gutters" data-id={assignment.id} onclick={handleViewAssignment}>
                                        <div class="slds-col slds-size_1-of-3">
                                            <div class="slds-text-title">Caregiver</div>
                                            <div class="slds-text-body_regular">{assignment.caregiverName}</div>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3">
                                            <div class="slds-text-title">Enclosure</div>
                                            <div class="slds-text-body_regular">{assignment.enclosureName}</div>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3">
                                            <div class="slds-text-title">Start Date</div>
                                            <div class="slds-text-body_regular">
                                                <lightning-formatted-date-time value={assignment.startDate}></lightning-formatted-date-time>
                                            </div>
                                        </div>
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </div>
                </template>
                
                <div class="slds-text-heading_small slds-m-bottom_small">Assignment History</div>
                <div class="slds-box slds-theme_shade">
                    <lightning-datatable
                        key-field="id"
                        data={assignments}
                        columns={columns}
                        hide-checkbox-column
                        show-row-number-column>
                    </lightning-datatable>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
