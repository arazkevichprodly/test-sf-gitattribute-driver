<template>
    <div class="slds-grid slds-wrap slds-gutters">
        <div class="slds-col slds-size_1-of-1">
            <lightning-card title="Volunteer Dashboard" icon-name="custom:custom63">
                <div class="slds-p-horizontal_small">
                    <div class="slds-text-heading_medium slds-p-bottom_medium">
                        Welcome to the Volunteer Connect Dashboard
                    </div>
                    
                    <div class="slds-grid slds-grid_vertical-align-center slds-p-bottom_medium">
                        <div class="slds-col">
                            <p>This dashboard provides quick access to volunteer services and requests.</p>
                        </div>
                    </div>
                    
                    <div class="slds-grid slds-wrap slds-gutters slds-p-bottom_large">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_medium">
                            <lightning-card title="Volunteer Services" icon-name="custom:custom15">
                                <div class="slds-p-horizontal_small">
                                    <p class="slds-p-bottom_medium">Manage your volunteer services or create new ones.</p>
                                    <div class="slds-grid slds-grid_align-center">
                                        <lightning-button label="Create New Service" 
                                                        variant="brand" 
                                                        onclick={handleCreateService}
                                                        class="slds-m-right_x-small">
                                        </lightning-button>
                                        <lightning-button label="View My Services" 
                                                        onclick={handleViewServices}>
                                        </lightning-button>
                                    </div>
                                </div>
                            </lightning-card>
                        </div>
                        
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-bottom_medium">
                            <lightning-card title="Service Requests" icon-name="custom:custom18">
                                <div class="slds-p-horizontal_small">
                                    <p class="slds-p-bottom_medium">View and manage service requests assigned to you.</p>
                                    <div class="slds-grid slds-grid_align-center">
                                        <lightning-button label="View Requests" 
                                                        variant="brand" 
                                                        onclick={handleViewRequests}>
                                        </lightning-button>
                                    </div>
                                </div>
                            </lightning-card>
                        </div>
                    </div>
                    
                    <div class="slds-grid slds-grid_vertical-align-center">
                        <div class="slds-col">
                            <p>Not registered as a volunteer yet?</p>
                        </div>
                        <div class="slds-col slds-text-align_right">
                            <lightning-button label="Register as Volunteer" 
                                            variant="brand" 
                                            onclick={handleRegisterVolunteer}>
                            </lightning-button>
                        </div>
                    </div>
                </div>
            </lightning-card>
        </div>
    </div>
</template>
