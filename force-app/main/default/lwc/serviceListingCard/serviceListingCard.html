<template>
    <lightning-card title={serviceName} icon-name="custom:custom15">
        <div class="slds-p-horizontal_small">
            <template if:true={service}>
                <div class="slds-grid slds-wrap">
                    <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                        <div class="slds-text-heading_small slds-p-bottom_x-small">Description</div>
                        <div class="slds-text-body_regular">{serviceDescription}</div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <div class="slds-text-heading_small slds-p-bottom_x-small">Status</div>
                        <lightning-badge label={serviceStatus} class={statusClass}></lightning-badge>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <div class="slds-text-heading_small slds-p-bottom_x-small">Location</div>
                        <div class="slds-text-body_regular">{serviceLocation}</div>
                    </div>
                </div>
            </template>
            <template if:true={error}>
                <div class="slds-text-color_error">
                    An error occurred while loading the service details.
                </div>
            </template>
        </div>
        <div slot="footer">
            <lightning-button label="View Details" onclick={handleViewDetails} class="slds-m-right_x-small"></lightning-button>
            <lightning-button label="Request Service" variant="brand" onclick={handleRequestService} disabled={isAvailable}></lightning-button>
        </div>
    </lightning-card>
</template>
