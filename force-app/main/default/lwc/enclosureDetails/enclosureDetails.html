<template>
    <div class="enclosure-details">
        <lightning-card>
            <div slot="title">
                <div class="slds-media slds-media_center">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="custom:custom40" size="small"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <h2 class="slds-card__header-title">{name}</h2>
                        <p class="slds-text-body_small">{location}</p>
                    </div>
                </div>
            </div>
            
            <div slot="actions">
                <lightning-button-group>
                    <lightning-button label="Edit" icon-name="utility:edit" onclick={handleEdit}></lightning-button>
                    <lightning-button label="New Assignment" icon-name="utility:add" onclick={handleNewAssignment}></lightning-button>
                </lightning-button-group>
            </div>
            
            <div class="slds-p-horizontal_small">
                <div class="slds-grid slds-gutters slds-wrap">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                        <div class="slds-box slds-box_x-small slds-m-bottom_medium">
                            <div class="slds-media">
                                <div class="slds-media__figure">
                                    <lightning-icon icon-name={environmentIcon} size="small"></lightning-icon>
                                </div>
                                <div class="slds-media__body">
                                    <p class="slds-text-title">Environment Type</p>
                                    <p class="slds-text-body_regular">{environmentType}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                        <div class="slds-box slds-box_x-small slds-m-bottom_medium">
                            <div class="slds-media">
                                <div class="slds-media__figure">
                                    <lightning-icon icon-name="utility:metrics" size="small"></lightning-icon>
                                </div>
                                <div class="slds-media__body">
                                    <p class="slds-text-title">Size</p>
                                    <p class="slds-text-body_regular">{size} sq ft</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                        <div class="slds-box slds-box_x-small slds-m-bottom_medium">
                            <div class="slds-media">
                                <div class="slds-media__figure">
                                    <lightning-icon icon-name="utility:groups" size="small"></lightning-icon>
                                </div>
                                <div class="slds-media__body">
                                    <p class="slds-text-title">Capacity</p>
                                    <p class="slds-text-body_regular">{capacity} animals</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="slds-box slds-theme_shade slds-m-top_medium">
                    <div class="slds-grid slds-grid_vertical-align-center">
                        <div class="slds-col slds-size_1-of-2">
                            <div class="slds-media">
                                <div class="slds-media__figure">
                                    <lightning-icon icon-name="utility:checkin" size="small"></lightning-icon>
                                </div>
                                <div class="slds-media__body">
                                    <p class="slds-text-title">Maintenance Status</p>
                                    <p class={maintenanceStatusClass}>{maintenanceStatus}</p>
                                </div>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-text-align_right">
                            <template if:true={isOperational}>
                                <lightning-badge label="Operational" class="slds-badge_success"></lightning-badge>
                            </template>
                            <template if:false={isOperational}>
                                <lightning-badge label={maintenanceStatus} class="slds-badge_warning"></lightning-badge>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </lightning-card>
    </div>
</template>
